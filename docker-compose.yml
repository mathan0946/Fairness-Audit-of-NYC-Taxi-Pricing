version: '3.8'

services:
  # ─────────── HDFS NameNode ───────────
  namenode:
    image: apache/hadoop:3
    container_name: hadoop-namenode
    hostname: namenode
    command: ["hdfs", "namenode"]
    ports:
      - "9870:9870"   # HDFS Web UI
      - "9000:9000"   # HDFS RPC
    environment:
      ENSURE_NAMENODE_DIR: "/tmp/hadoop-root/dfs/name"
      HADOOP_HOME: "/opt/hadoop"
    env_file:
      - ./hadoop.env
    volumes:
      - hadoop_namenode:/tmp/hadoop-root/dfs/name
      - ./data:/data
    networks:
      - hadoop-network

  # ─────────── HDFS DataNode ───────────
  datanode:
    image: apache/hadoop:3
    container_name: hadoop-datanode
    hostname: datanode
    command: ["hdfs", "datanode"]
    ports:
      - "9864:9864"   # DataNode Web UI
    environment:
      HADOOP_HOME: "/opt/hadoop"
    env_file:
      - ./hadoop.env
    volumes:
      - hadoop_datanode:/tmp/hadoop-root/dfs/data
    depends_on:
      - namenode
    networks:
      - hadoop-network

  # ─────────── YARN ResourceManager ───────────
  resourcemanager:
    image: apache/hadoop:3
    container_name: hadoop-resourcemanager
    hostname: resourcemanager
    command: ["yarn", "resourcemanager"]
    ports:
      - "8088:8088"   # YARN Web UI
    env_file:
      - ./hadoop.env
    depends_on:
      - namenode
    networks:
      - hadoop-network

  # ─────────── YARN NodeManager ───────────
  nodemanager:
    image: apache/hadoop:3
    container_name: hadoop-nodemanager
    hostname: nodemanager
    command: ["yarn", "nodemanager"]
    env_file:
      - ./hadoop.env
    depends_on:
      - resourcemanager
    networks:
      - hadoop-network

  # ─────────── Hive Metastore (Derby-backed) ───────────
  hive-metastore:
    image: apache/hive:4.0.1
    container_name: hive-metastore
    hostname: hive-metastore
    ports:
      - "9083:9083"   # Thrift Metastore
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
      HIVE_METASTORE_WAREHOUSE_DIR: hdfs://namenode:9000/user/hive/warehouse
    env_file:
      - ./hadoop.env
    depends_on:
      - namenode
      - datanode
    networks:
      - hadoop-network

  # ─────────── HiveServer2 (JDBC / Beeline) ───────────
  hiveserver2:
    image: apache/hive:4.0.1
    container_name: hiveserver2
    hostname: hiveserver2
    ports:
      - "10000:10000" # JDBC
      - "10002:10002" # HiveServer2 Web UI
    environment:
      SERVICE_NAME: hiveserver2
      HIVE_METASTORE_URIS: thrift://hive-metastore:9083
    env_file:
      - ./hadoop.env
    depends_on:
      - hive-metastore
    networks:
      - hadoop-network

volumes:
  hadoop_namenode:
  hadoop_datanode:

networks:
  hadoop-network:
    driver: bridge
